<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AcessaFácil</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Cabeçalho -->
  <header class="cabecalho">
    <div class="avatar" aria-hidden="true">A</div>
    <div class="cabecalho-info">
      <span class="nome">AcessaFácil</span>
      <span class="subtitulo">ativo nesta página</span>
    </div>
  </header>

  <hr class="divisor">

  <!-- Ajustes visuais e de voz -->
  <section class="secao-ajustes" aria-label="Ajustes">

    <label class="toggle-linha" for="toggle-texto-maior">
      <span class="toggle-rotulo">Texto maior</span>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-texto-maior" role="switch">
        <span class="toggle-slider" aria-hidden="true"></span>
      </div>
    </label>

    <label class="toggle-linha" for="toggle-contraste">
      <span class="toggle-rotulo">Mais contraste</span>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-contraste" role="switch">
        <span class="toggle-slider" aria-hidden="true"></span>
      </div>
    </label>

    <label class="toggle-linha" for="toggle-simplificar">
      <span class="toggle-rotulo">Simplificar a página</span>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-simplificar" role="switch">
        <span class="toggle-slider" aria-hidden="true"></span>
      </div>
    </label>

    <label class="toggle-linha" for="toggle-ler-voz">
      <span class="toggle-rotulo">Ler em voz alta</span>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-ler-voz" role="switch">
        <span class="toggle-slider" aria-hidden="true"></span>
      </div>
    </label>

  </section>

  <hr class="divisor">

  <!-- Ações -->
  <section class="secao-acoes">
    <button class="btn-primario" id="btn-pedir-ajuda">
      🎙️ Pedir ajuda
    </button>
    <button class="btn-secundario" id="btn-resumir">
      📋 Resumir a página
    </button>
  </section>

  <!-- Status de carregamento -->
  <div id="status" class="status" role="status" aria-live="polite" hidden></div>

  <!-- Rodapé -->
  <footer class="rodape">
    <button class="btn-rodape" id="btn-ajustes">⚙ Ajustes</button>
    <button class="btn-rodape" id="btn-ajuda">? Ajuda</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
